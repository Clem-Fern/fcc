# at least one policies must be present
[[policies]]
paths = [
    "policy1", # relative path, relative to manifest file path
    "./policy2", # same as above
    "/tmp/policy3" # absolut path
]

[[policies]]
# recursive option ? TODO
paths = [
    "policies", # if a directory, get all files from it
]

# at least one configs must be present
[[configs]]
# configs parsing related option
# regignore: regex used to ignore lines from configuration
# regignore: recommanded to ignore comments (like ! with Cisco)
# regignore = "^\\s*!.*$" 

# retrieve configurations from files
[[configs.files]]
# recursive option ? TODO
paths = [
    "config1", # relative path, relative to manifest file path
    "./config2", # same as above
    "/tmp/config3" # absolut path
]

# retrieve configurations from remote using ssh exec
[[configs.ssh-exec]]
cmd = "show running"
user = "clem"
# auth ? ask passwd ? key ? passphrase ? ask passphrase ? TODO
hosts= [
    "192.168.1.2:22",
    "192.168.13.2:22",
    "192.168.1.5:22",
]

